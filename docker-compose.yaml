version: '3.8'

services:
  # [MÁQUINA DE DESARROLLO] - Entrenamiento YOLO26
  cbn_train:
    image: localhost/neuralbottlescbn_cbn_train:latest
    build:
      context: .
      target: python_env
    working_dir: /workspace/ws_py
    volumes:
      - ./ws_py:/workspace/ws_py
    # GPU: podman-compose no soporta sintaxis CDI en 'devices'.
    # Para usar GPU NVIDIA, ejecutar manualmente:
    #   podman run --rm -it --device nvidia.com/gpu=all -v ./ws_py:/workspace/ws_py localhost/neuralbottlescbn_cbn_train python3 test/test_env.py
    # Requisitos previos:
    #   1. sudo apt-get install -y nvidia-container-toolkit
    #   2. sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
    group_add:
      - video
    command: /bin/bash -c "python3 train.py && python3 export_int8.py"

  # [MÁQUINA DE DESARROLLO] - Prueba de Inferencia C++ Local (Compilación Nativa)
  cbn_test_cpp:
    image: localhost/neuralbottlescbn_cbn_test_cpp:latest
    network_mode: host
    build:
      context: .
      target: cpp_base
    working_dir: /workspace/ws_cpp
    devices:
      - "/dev/video0:/dev/video0" # Ajuste según su cámara web
    group_add:
      - video
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    ipc: host
    volumes:
      - ./ws_cpp:/workspace/ws_cpp
      - ./ws_py/dataset:/workspace/ws_py/dataset
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    command: /bin/bash -lc "mkdir -p build && cd build && cmake .. -G Ninja -DCMAKE_CXX_FLAGS='-O3 -march=native' && ninja && ./laboratorio_cbn"

  # [MÁQUINA DE PRODUCCIÓN] - Inferencia Industrial
  cbn_edge:
    image: localhost/neuralbottles_edge:latest
    devices:
      - "/dev/video0:/dev/video0"
    group_add:
      - video
    working_dir: /app
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    ipc: host
    volumes:
      - ./ws_cpp/models:/app/models:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    restart: unless-stopped
